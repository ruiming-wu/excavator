data:
  aligned_root: data/aligned
  raw_root: data/raw
  run_glob: run_*
  image_height: 160
  image_width: 240
  image_channels: 3
  point_count: 4096
  point_dim: 3
  joint_order:
    - swing_joint
    - boom_joint
    - arm_joint
    - bucket_joint
  command_source: action_position
  observation_state_key: current_state
  target_command_key: future_cmd_seq
  future_start: 1
  horizon: 16
  seed: 42
  train_ratio: 0.95
  hesitation_filter_enabled: true
  hesitation_zero_motion_threshold: 0.0
  hesitation_full_keep_threshold: 0.02

model:
  emb_dim: 256
  hidden_dim: 512
  time_dim: 64
  image_conv_channels: [16, 32, 64]
  point_hidden_dim: 64
  point_feature_dim: 64
  state_hidden_dim: 128

training:
  output_dir: logs
  run_name: ""
  batch_size: 32
  epochs: 200
  lr: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  device: auto
  grad_clip_norm: 1.0
  log_interval: 100
  save_interval_epochs: 25
  save_every_epoch: false
  wandb:
    enabled: true
    project: excavator_policy
    name: ""
    mode: online
  scheduler:
    enabled: true
    type: reduce_on_plateau
    mode: min
    factor: 0.5
    patience: 15
    min_lr: 1.0e-6
