data:
  aligned_root: data/aligned
  raw_root: data/raw
  run_glob: run_*
  image_height: 160
  image_width: 240
  image_channels: 3
  point_count: 4096
  point_dim: 3
  joint_order:
    - swing_joint
    - boom_joint
    - arm_joint
    - bucket_joint
  command_source: action_position
  observation_state_key: current_state
  target_command_key: future_cmd_seq
  future_start: 1
  horizon: 16
  seed: 42
  train_ratio: 0.9

model:
  image_out_dim: 512
  image_pretrained: false
  point_hidden_dims: [64, 128, 256, 512]
  point_out_dim: 512
  state_hidden_dims: [256, 512]
  state_out_dim: 512
  hidden_dim: 2048
  time_dim: 128

training:
  output_dir: logs
  run_name: ""
  batch_size: 32
  epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  device: auto
  grad_clip_norm: 1.0
  log_interval: 100
  save_interval_epochs: 25
  save_every_epoch: false
  wandb:
    enabled: true
    project: excavator_policy
    name: excavator_policy
    mode: online
